<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a1a">
    <title>Tickblade - Pendulum Rhythm Battle</title>
    <meta property="og:title" content="Tickblade - Pendulum Rhythm Battle">
    <meta property="og:description" content="A rhythm jumper. Hit the beat and dodge the blade!.">
    <meta property="og:image" content="https://amal-sajeev.github.io/tickblade/preview.png">
    <meta property="og:url" content="https://amal-sajeev.github.io/tickblade/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tickblade - Pendulum Rhythm Battle">
    <meta name="twitter:description" content="A rhythm battle game. Hit the beat, slash your opponent.">
    <meta name="twitter:image" content="https://amal-sajeev.github.io/tickblade/preview.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>&#9876;</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="500"></canvas>

        <div id="hud" class="hidden">
            <div id="hud-p1" class="hud-side">
                <div class="player-label">P1</div>
                <div class="hearts" id="hearts-p1"></div>
                <div class="score-row">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="score-p1">0</span>
                </div>
                <div class="streak-row" id="streak-p1"></div>
            </div>
            <div id="hud-center">
                <span id="bpm-display">60 BPM</span>
            </div>
            <div id="hud-p2" class="hud-side">
                <div class="player-label">P2</div>
                <div class="hearts" id="hearts-p2"></div>
                <div class="score-row">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="score-p2">0</span>
                </div>
                <div class="streak-row" id="streak-p2"></div>
            </div>
        </div>

        <div id="menu-screen">
            <h1 class="title">TICKBLADE</h1>
            <p class="subtitle">Pendulum Rhythm Battle</p>
            <div class="menu-buttons">
                <button class="btn" id="btn-practice">PRACTICE</button>
                <button class="btn" id="btn-survival">SURVIVAL</button>
                <button class="btn" id="btn-local">LOCAL 1v1</button>
                <button class="btn" id="btn-online">ONLINE 1v1</button>
                <button class="btn btn-small" id="btn-settings">SETTINGS</button>
                <button class="btn btn-debug-menu hidden" id="btn-debug-mode">DEBUG MODE</button>
            </div>
            <div class="controls-hint">
                <div class="controls-hint-keyboard">
                    <p>P1: <kbd>SPACE</kbd> or <kbd>W</kbd></p>
                    <p>P2: <kbd>UP</kbd> or <kbd>ENTER</kbd></p>
                </div>
                <div class="controls-hint-touch">
                    <p>TAP anywhere to jump</p>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="hidden">
            <h2 class="lobby-title">ONLINE BATTLE</h2>
            <div class="lobby-panel">
                <button class="btn" id="btn-create-room">CREATE ROOM</button>
                <div id="room-code-display" class="hidden">
                    <p class="room-label">ROOM CODE</p>
                    <div class="room-code" id="room-code"></div>
                    <p class="waiting-text">Waiting for opponent...</p>
                </div>
            </div>
            <div class="lobby-divider">OR</div>
            <div class="lobby-panel">
                <input type="text" id="join-code-input" class="code-input" placeholder="ENTER CODE" maxlength="6" spellcheck="false" autocomplete="off">
                <button class="btn" id="btn-join-room">JOIN ROOM</button>
            </div>
            <div id="lobby-status"></div>
            <button class="btn btn-small" id="btn-lobby-back">BACK</button>
        </div>

        <div id="results-screen" class="hidden">
            <h2 class="results-title" id="results-title">GAME OVER</h2>
            <div id="results-body"></div>
            <div class="menu-buttons">
                <button class="btn" id="btn-play-again">PLAY AGAIN</button>
                <button class="btn btn-small" id="btn-back-menu">MENU</button>
            </div>
        </div>

        <div id="pause-screen" class="hidden">
            <h2 class="pause-title">PAUSED</h2>
            <div class="menu-buttons">
                <button class="btn" id="btn-resume">RESUME</button>
                <button class="btn btn-small" id="btn-pause-quit">QUIT TO MENU</button>
            </div>
        </div>

        <div id="difficulty-screen" class="hidden">
            <h2 class="difficulty-title">SELECT DIFFICULTY</h2>
            <div class="menu-buttons">
                <button class="btn btn-diff" id="btn-diff-easy">EASY</button>
                <button class="btn btn-diff btn-diff-selected" id="btn-diff-normal">NORMAL</button>
                <button class="btn btn-diff" id="btn-diff-hard">HARD</button>
            </div>
            <div id="practice-options" class="hidden">
                <div class="practice-option-title">PRACTICE OPTIONS</div>
                <div class="settings-row">
                    <label>BPM</label>
                    <input type="range" id="diff-bpm" min="30" max="240" value="60" step="5">
                    <span id="diff-bpm-val">60</span>
                </div>
                <div class="settings-row">
                    <label>Lock BPM</label>
                    <button class="btn btn-debug" id="diff-lock-bpm">OFF</button>
                </div>
            </div>
            <div class="mutators">
                <label class="mutator-toggle"><input type="checkbox" id="mut-onehit"> One-Hit KO</label>
                <label class="mutator-toggle"><input type="checkbox" id="mut-doubleramp"> Double Ramp</label>
                <label class="mutator-toggle"><input type="checkbox" id="mut-invisible"> Invisible Blade</label>
            </div>
            <div class="menu-buttons" style="margin-top:12px">
                <button class="btn" id="btn-diff-start">START</button>
                <button class="btn btn-small" id="btn-diff-back">BACK</button>
            </div>
        </div>

        <div id="settings-screen" class="hidden">
            <h2 class="settings-title">SETTINGS</h2>
            <div class="settings-panel">
                <div class="settings-row">
                    <label>Master</label>
                    <input type="range" id="set-master" min="0" max="100" value="100">
                    <span id="set-master-val">100%</span>
                </div>
                <div class="settings-row">
                    <label>SFX</label>
                    <input type="range" id="set-sfx" min="0" max="100" value="100">
                    <span id="set-sfx-val">100%</span>
                </div>
                <div class="settings-row">
                    <label>Music</label>
                    <input type="range" id="set-music" min="0" max="100" value="50">
                    <span id="set-music-val">50%</span>
                </div>
                <div class="settings-row">
                    <label>Screen Shake</label>
                    <button class="btn btn-debug" id="set-shake">ON</button>
                </div>
                <div class="settings-row">
                    <label>Camera Sway</label>
                    <button class="btn btn-debug" id="set-camera">ON</button>
                </div>
            </div>
            <div class="menu-buttons" style="margin-top:16px">
                <button class="btn btn-small" id="btn-settings-back">BACK</button>
            </div>
        </div>

        <div id="tutorial-overlay" class="hidden">
            <div class="tutorial-box">
                <div class="tutorial-text" id="tutorial-text"></div>
                <div class="tutorial-btns">
                    <button class="btn btn-small" id="btn-tutorial-next">NEXT</button>
                    <button class="btn btn-small" id="btn-tutorial-skip">SKIP</button>
                </div>
            </div>
        </div>

        <div id="debug-hud" class="hidden">
            <div class="debug-hud-title">DEBUG</div>
            <div class="debug-row">
                <label>Speed</label>
                <input type="range" id="debug-speed" min="5" max="100" value="100" step="5">
                <span id="debug-speed-val">1.0x</span>
            </div>
            <div class="debug-row">
                <label>BPM</label>
                <input type="range" id="debug-bpm" min="20" max="300" value="60">
                <span id="debug-bpm-val">60</span>
            </div>
            <div class="debug-row">
                <label>Damage</label>
                <button class="btn btn-debug" id="debug-toggle-damage">OFF</button>
            </div>
            <div class="debug-row">
                <label>Inf Hearts</label>
                <button class="btn btn-debug" id="debug-toggle-infhearts">ON</button>
            </div>
            <div class="debug-cfg-title">CONFIG</div>
            <div class="debug-cfg-scroll" id="debug-cfg-list"></div>
            <div class="debug-btns">
                <button class="btn btn-debug" id="debug-cfg-reset">RESET CFG</button>
                <button class="btn btn-debug" id="debug-kill">KILL</button>
                <button class="btn btn-debug" id="debug-restart">RESTART</button>
                <button class="btn btn-debug btn-debug-quit" id="debug-quit">QUIT</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="sprites.js"></script>
    <script src="audio.js"></script>
    <script src="multiplayer.js"></script>
    <script src="renderer.js"></script>
    <script src="game.js"></script>
</body>
</html>
